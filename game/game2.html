<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: #f5f5f5;
    }

    .game-container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid black;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<div class="game-container">

  <h1>Rock Paper Scissors</h1>

  <!-- Buttons -->
  <button onclick="play('rock')">Rock</button>
  <button onclick="play('paper')">Paper</button>
  <button onclick="play('scissors')">Scissors</button>

  <!-- Result -->
  <h2 id="result">Make your move!</h2>

  <!-- Table -->
  <table>
    <tr>
      <th>Matches</th>
      <th>Win</th>
      <th>Lose</th>
    </tr>
    <tr>
      <td id="matches">0</td>
      <td id="wins">0</td>
      <td id="losses">0</td>
    </tr>
  </table>

  <!-- Play Again -->
  <button onclick="resetGame()">Play Again</button>

</div>

<script>
  let matches = 0
  let wins = 0
  let losses = 0

  function play(userChoice) {
    const choices = ['rock', 'paper', 'scissors']
    const computerChoice = choices[Math.floor(Math.random() * 3)]

    let result = ""

    if (userChoice === computerChoice) {
      result = "Draw!"
    } 
    else if (
      (userChoice === 'rock' && computerChoice === 'scissors') ||
      (userChoice === 'paper' && computerChoice === 'rock') ||
      (userChoice === 'scissors' && computerChoice === 'paper')
    ) {
      result = "You Win!"
      wins++
    } 
    else {
      result = "You Lose!"
      losses++
    }

    matches++

    // Update UI
    document.getElementById("result").innerText =
      `You: ${userChoice} | Computer: ${computerChoice} → ${result}`

    document.getElementById("matches").innerText = matches
    document.getElementById("wins").innerText = wins
    document.getElementById("losses").innerText = losses
  }

  function resetGame() {
    matches = 0
    wins = 0
    losses = 0

    document.getElementById("matches").innerText = 0
    document.getElementById("wins").innerText = 0
    document.getElementById("losses").innerText = 0
    document.getElementById("result").innerText = "Make your move!"
  }
</script>

</body>
</html>
