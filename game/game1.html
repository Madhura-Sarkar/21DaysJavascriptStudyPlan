<!DOCTYPE html>
<html lang="en">
<head>
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      cursor: pointer;
    }

    #message {
      font-size: 20px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🎯 Number Guessing Game</h1>

  <p>Guess a number between 1 and 100</p>

  <input type="number" id="guessInput" placeholder="Enter number" />
  <br>

  <button onclick="checkGuess()">Submit</button>
  <button onclick="restartGame()">Restart</button>

  <p id="message"></p>
  <p id="attempts"></p>

  <script>
    let randomNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function checkGuess() {
      let guess = Number(document.getElementById("guessInput").value);
      let message = document.getElementById("message");
      let attemptText = document.getElementById("attempts");

      if (isNaN(guess)) {
        message.innerText = "❌ Please enter a valid number";
        return;
      }

      attempts++;
      attemptText.innerText = "Attempts: " + attempts;

      if (guess === randomNumber) {
        message.innerText = "🎉 You Win!";
      } else if (guess > randomNumber) {
        message.innerText = "📉 Too High!";
      } else {
        message.innerText = "📈 Too Low!";
      }
    }

    function restartGame() {
      randomNumber = Math.floor(Math.random() * 100) + 1; //Math.random() * 100 = 0 to 99.999 and math.floor removes the .999 so [(0 to 99)+1] = [ 1 to 100]
      attempts = 0;
      document.getElementById("message").innerText = "";
      document.getElementById("attempts").innerText = "";
      document.getElementById("guessInput").value = "";
    }
  </script>

</body>
</html>
