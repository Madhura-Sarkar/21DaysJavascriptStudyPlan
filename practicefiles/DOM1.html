<!-- Create a variable heading and set its value to the h1 element in the HTML document. Then change the text of the heading to "Hello, world!".  -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice</title>
</head>

<body>
    <h1>Welcome To DOM practice section</h1>

    <script>
        const heading = document.querySelector('h1');
        heading.textContent = "Hello World!";
    </script>
</body>
</html>
